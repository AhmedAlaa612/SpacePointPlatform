name: Trigger auto deployment for spacepoint-back

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/spacepoint-back-AutoDeployTrigger-b64ea4de-0f65-424c-8373-d4370d6f8b36.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SPACEPOINTBACK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SPACEPOINTBACK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SPACEPOINTBACK_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.SPACEPOINTBACK_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SPACEPOINTBACK_REGISTRY_PASSWORD }}
          containerAppName: spacepoint-back
          resourceGroup: space
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


